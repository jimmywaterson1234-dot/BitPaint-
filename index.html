<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitPaint - Cyberpunk Art Network</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Экран авторизации -->
    <div id="login-screen" class="screen active">
        <div class="login-card glass-panel">
            <div class="login-logo"><i class="fa-solid fa-paintbrush"></i></div>
            <h1>BitPaint</h1>
            <p>Добро пожаловать в Неоновую Сеть</p>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="login-nickname" placeholder="Уникальный никнейм" autocomplete="off">
            </div>
            <button id="login-btn" class="cyber-btn-glow">Войти в систему <i class="fa-solid fa-bolt"></i></button>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="main-app" class="screen">
        
        <!-- Шапка -->
        <header class="glass-panel">
            <div class="logo" onclick="app.navigate('feed')">
                <i class="fa-solid fa-paintbrush"></i> <span>BitPaint</span>
            </div>
            <nav>
                <button class="nav-btn" onclick="app.navigate('leaderboard')"><i class="fa-solid fa-trophy"></i> <span>Топ</span></button>
                <button class="cyber-btn-glow nav-draw-btn" onclick="canvasEngine.openEditor('new')"><i class="fa-solid fa-pen-nib"></i> <span>Рисовать</span></button>
            </nav>
            <div class="user-menu" onclick="app.navigate('profile')">
                <span id="nav-nickname" class="hide-mobile">User</span>
                <img id="nav-avatar" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" alt="avatar">
            </div>
        </header>

        <!-- Контент -->
        <main>
            <!-- Лента (Feed) -->
            <div id="feed-view" class="view active">
                <div class="grid-container" id="feed-grid"></div>
            </div>

            <!-- Профиль -->
            <div id="profile-view" class="view">
                <div class="profile-header glass-panel">
                    <div class="profile-avatar-container">
                        <img id="profile-avatar" src="" alt="avatar">
                        <button class="edit-avatar-btn" onclick="canvasEngine.openEditor('avatar')"><i class="fa-solid fa-camera"></i></button>
                    </div>
                    <div class="profile-info">
                        <h2 id="profile-name">Nickname</h2>
                        <div class="stats">
                            <div class="stat-box">
                                <i class="fa-solid fa-heart" style="color: var(--danger)"></i>
                                <div class="stat-val" id="profile-likes">0</div>
                                <div class="stat-label">Лайков</div>
                            </div>
                            <div class="stat-box">
                                <i class="fa-solid fa-image" style="color: var(--primary-glow)"></i>
                                <div class="stat-val" id="profile-works">0</div>
                                <div class="stat-label">Работ</div>
                            </div>
                        </div>
                    </div>
                </div>
                <h3 class="section-title"><i class="fa-solid fa-border-all"></i> Мои работы</h3>
                <div class="grid-container" id="profile-grid"></div>
            </div>

            <!-- Зал Славы -->
            <div id="leaderboard-view" class="view">
                <h2 class="section-title"><i class="fa-solid fa-crown" style="color: gold"></i> Зал Славы</h2>
                <div id="leaderboard-list" class="leaderboard-list"></div>
            </div>

            <!-- Редактор Canvas -->
            <div id="canvas-view" class="view full-height-view">
                <div class="editor-layout">
                    
                    <!-- Верхняя панель (Настройки и Сохранение) -->
                    <div class="editor-top-bar glass-panel">
                        <div class="settings-group">
                            <input type="color" id="brush-color" value="#b967ff" title="Выбор цвета">
                            
                            <div class="range-wrapper">
                                <i class="fa-solid fa-circle-dot" style="font-size: 0.6em;"></i>
                                <input type="range" id="brush-size" min="1" max="50" value="5">
                                <i class="fa-solid fa-circle" style="font-size: 1.2em;"></i>
                            </div>

                            <div class="toggles hide-mobile-small">
                                <label class="cyber-checkbox"><input type="checkbox" id="neon-toggle" checked><span>Неон</span></label>
                                <label class="cyber-checkbox"><input type="checkbox" id="fill-shape"><span>Заливка</span></label>
                                <select id="texture-select" class="cyber-select">
                                    <option value="none">Текстура: Нет</option>
                                    <option value="bricks">Кирпичи</option>
                                    <option value="wood">Дерево</option>
                                    <option value="stone">Камень</option>
                                </select>
                            </div>
                        </div>
                        <div class="actions-group">
                            <button class="cyber-btn-icon" id="btn-undo" title="Шаг назад (Ctrl+Z)"><i class="fa-solid fa-rotate-left"></i></button>
                            <button class="cyber-btn-outline hide-mobile" onclick="app.navigate('feed')">Отмена</button>
                            <button class="cyber-btn-glow" id="btn-save"><i class="fa-solid fa-floppy-disk"></i> <span class="hide-mobile">Сохранить</span></button>
                        </div>
                    </div>

                    <!-- Холст -->
                    <div class="canvas-wrapper">
                        <canvas id="drawing-board"></canvas>
                    </div>

                    <!-- Нижняя панель (Док инструментов) -->
                    <div class="tools-dock glass-panel">
                        <button class="tool-btn active" data-tool="pencil" title="Карандаш"><i class="fa-solid fa-pencil"></i></button>
                        <button class="tool-btn" data-tool="eraser" title="Ластик"><i class="fa-solid fa-eraser"></i></button>
                        <div class="dock-divider"></div>
                        <button class="tool-btn" data-tool="line" title="Линия"><i class="fa-solid fa-minus"></i></button>
                        <button class="tool-btn" data-tool="rect" title="Прямоугольник"><i class="fa-regular fa-square"></i></button>
                        <button class="tool-btn" data-tool="circle" title="Круг"><i class="fa-regular fa-circle"></i></button>
                        <div class="dock-divider"></div>
                        <button class="tool-btn" data-tool="fill" title="Заливка"><i class="fa-solid fa-fill-drip"></i></button>
                        <button class="tool-btn" data-tool="picker" title="Пипетка"><i class="fa-solid fa-eye-dropper"></i></button>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
