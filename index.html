<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitPaint - Neon Cyberpunk Canvas</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app">
        <!-- 1. Login Screen -->
        <section id="login-screen" class="screen active">
            <div class="login-card neon-card">
                <h1 class="neon-text">BitPaint</h1>
                <p>Войдите в кибер-мастерскую</p>
                <input type="text" id="nickname-input" placeholder="Ваш уникальный никнейм..." maxlength="20">
                <button id="login-btn" class="neon-btn"><i class="fa-solid fa-right-to-bracket"></i> Войти</button>
            </div>
        </section>

        <!-- 2. Main Gallery Screen -->
        <section id="main-screen" class="screen">
            <header class="app-header neon-card">
                <h2 class="neon-text logo">BitPaint</h2>
                <div class="header-controls">
                    <button class="icon-btn" onclick="showScreen('leaderboard-screen')" title="Зал Славы"><i class="fa-solid fa-trophy"></i></button>
                    <button class="neon-btn btn-sm" onclick="openEditor('new')"><i class="fa-solid fa-paintbrush"></i> Рисовать</button>
                    <div class="user-profile-link" onclick="showProfile(currentUser)">
                        <img id="header-avatar" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" alt="Avatar">
                        <span id="header-nickname">User</span>
                    </div>
                </div>
            </header>
            <main id="feed" class="gallery-grid"></main>
        </section>

        <!-- 3. Profile Screen -->
        <section id="profile-screen" class="screen">
            <header class="app-header neon-card">
                <button class="icon-btn" onclick="showScreen('main-screen')"><i class="fa-solid fa-arrow-left"></i> Назад</button>
                <h2 class="neon-text">Профиль</h2>
                <div style="width: 40px;"></div> <!-- Spacer -->
            </header>
            <div class="profile-info neon-card">
                <div class="avatar-container">
                    <img id="profile-avatar" src="" alt="Avatar">
                    <button id="edit-avatar-btn" class="icon-btn edit-avatar" onclick="openEditor('avatar')"><i class="fa-solid fa-pencil"></i></button>
                </div>
                <h3 id="profile-nickname" class="neon-text">Nickname</h3>
                <div class="profile-stats">
                    <span><i class="fa-solid fa-heart"></i> Лайков: <b id="stat-likes">0</b></span>
                    <span><i class="fa-solid fa-image"></i> Работ: <b id="stat-drawings">0</b></span>
                </div>
            </div>
            <main id="profile-grid" class="gallery-grid"></main>
        </section>

        <!-- 4. Leaderboard Screen -->
        <section id="leaderboard-screen" class="screen">
            <header class="app-header neon-card">
                <button class="icon-btn" onclick="showScreen('main-screen')"><i class="fa-solid fa-arrow-left"></i> Назад</button>
                <h2 class="neon-text">Зал Славы</h2>
                <div style="width: 40px;"></div>
            </header>
            <main id="leaderboard-list" class="leaderboard-container"></main>
        </section>

        <!-- 5. Canvas Editor Screen -->
        <section id="editor-screen" class="screen">
            <div class="editor-header neon-card">
                <div class="toolbar-group">
                    <button class="icon-btn" onclick="closeEditor()"><i class="fa-solid fa-times"></i></button>
                    <button class="icon-btn" onclick="undo()" title="Шаг назад (Ctrl+Z)"><i class="fa-solid fa-rotate-left"></i></button>
                </div>
                
                <div class="toolbar-group tools">
                    <button class="tool-btn active" data-tool="pencil" title="Карандаш"><i class="fa-solid fa-pen"></i></button>
                    <button class="tool-btn" data-tool="eraser" title="Ластик"><i class="fa-solid fa-eraser"></i></button>
                    <button class="tool-btn" data-tool="line" title="Линия"><i class="fa-solid fa-minus"></i></button>
                    <button class="tool-btn" data-tool="rect" title="Прямоугольник"><i class="fa-regular fa-square"></i></button>
                    <button class="tool-btn" data-tool="circle" title="Круг"><i class="fa-regular fa-circle"></i></button>
                    <button class="tool-btn" data-tool="fill" title="Заливка"><i class="fa-solid fa-fill-drip"></i></button>
                </div>

                <div class="toolbar-group settings">
                    <input type="color" id="color-picker" value="#b967ff">
                    <input type="range" id="size-slider" min="1" max="50" value="5">
                    <label class="neon-toggle">
                        <input type="checkbox" id="neon-mode" checked>
                        <span class="toggle-label">Неон ✨</span>
                    </label>
                </div>

                <div class="toolbar-group">
                    <button class="neon-btn btn-sm" onclick="saveDrawing()"><i class="fa-solid fa-floppy-disk"></i> Сохранить</button>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="paint-canvas"></canvas>
            </div>
        </section>
    </div>

    <!-- JS -->
    <script src="app.js"></script>
</body>
</html>
