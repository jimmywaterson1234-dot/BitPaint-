<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitPaint - Neon Cyberpunk</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase Compat v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка (скрыта на экране авторизации) -->
    <header id="main-header" class="hidden">
        <div class="logo">BitPaint <i class="fas fa-paint-brush"></i></div>
        <nav class="nav-links">
            <button onclick="app.navigate('hall-screen')" title="Зал Славы"><i class="fas fa-trophy"></i></button>
            <button onclick="app.navigate('main-screen')" title="Лента"><i class="fas fa-stream"></i></button>
            <button onclick="app.navigate('draw-screen')" class="neon-btn" title="Рисовать"><i class="fas fa-plus"></i></button>
        </nav>
        <div class="user-info" onclick="app.navigate('profile-screen')">
            <img id="header-avatar" src="https://via.placeholder.com/40" alt="Avatar">
            <span id="header-username">User</span>
        </div>
    </header>

    <!-- Экран авторизации -->
    <main id="auth-screen" class="screen">
        <div class="auth-card neon-card">
            <h1>BitPaint</h1>
            <p>Войдите в неоновую сеть</p>
            <input type="text" id="login-nickname" placeholder="Введите ваш никнейм..." autocomplete="off">
            <button onclick="app.login()" class="neon-btn">Войти</button>
        </div>
    </main>

    <!-- Главный экран (Лента) -->
    <main id="main-screen" class="screen hidden">
        <div id="feed-container" class="grid-container"></div>
    </main>

    <!-- Экран рисования (Канвас) -->
    <main id="draw-screen" class="screen hidden">
        <div class="toolbar neon-card">
            <input type="text" id="art-title" placeholder="Название шедевра..." autocomplete="off">
            <div class="tools">
                <button onclick="canvasApp.setTool('pencil')" class="active" id="tool-pencil"><i class="fas fa-pencil-alt"></i></button>
                <button onclick="canvasApp.setTool('line')" id="tool-line"><i class="fas fa-slash"></i></button>
                <button onclick="canvasApp.setTool('rect')" id="tool-rect"><i class="far fa-square"></i></button>
                <button onclick="canvasApp.setTool('circle')" id="tool-circle"><i class="far fa-circle"></i></button>
                <button onclick="canvasApp.setTool('eraser')" id="tool-eraser"><i class="fas fa-eraser"></i></button>
                <button onclick="canvasApp.setTool('eyedropper')" id="tool-eyedropper"><i class="fas fa-eye-dropper"></i></button>
            </div>
            <div class="settings">
                <input type="color" id="color-picker" value="#8a2be2">
                <input type="range" id="line-width" min="1" max="20" value="3">
            </div>
            <button onclick="canvasApp.publishArt()" class="neon-btn"><i class="fas fa-paper-plane"></i> В ленту</button>
        </div>
        <div id="canvas-wrapper">
            <canvas id="paint-canvas"></canvas>
        </div>
    </main>

    <!-- Зал Славы -->
    <main id="hall-screen" class="screen hidden">
        <h2 class="screen-title">Зал Славы <i class="fas fa-crown"></i></h2>
        <div id="hall-container" class="list-container"></div>
    </main>

    <!-- Профиль -->
    <main id="profile-screen" class="screen hidden">
        <div class="profile-header neon-card">
            <img id="profile-avatar" src="https://via.placeholder.com/100" alt="Avatar">
            <h2 id="profile-name">User</h2>
            <p>Всего лайков: <span id="profile-likes-total" class="neon-text">0</span> <i class="fas fa-heart"></i></p>
            <div class="avatar-edit">
                <input type="text" id="avatar-url-input" placeholder="URL новой аватарки...">
                <button onclick="app.updateAvatar()" class="neon-btn">Обновить</button>
                <button onclick="app.logout()" class="neon-btn" style="background: #ff2a2a; border-color: #ff2a2a;">Выйти</button>
            </div>
        </div>
        <h3 class="screen-title">Мои работы</h3>
        <div id="profile-grid" class="grid-container"></div>
    </main>

    <!-- JS -->
    <script src="app.js"></script>
</body>
</html>
