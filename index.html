<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitPaint - Neon Cyberpunk</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen active">
        <div class="auth-box glow-panel">
            <h1><i class="fas fa-paint-brush"></i> BitPaint</h1>
            <p>Войдите, чтобы начать творить</p>
            <input type="text" id="nickname-input" placeholder="Ваш никнейм..." maxlength="15">
            <button id="login-btn" class="neon-btn">Войти</button>
        </div>
    </div>

    <!-- Главный экран (Лента) -->
    <div id="main-screen" class="screen hidden">
        <header class="top-nav glow-panel">
            <div class="logo"><i class="fas fa-paint-brush"></i> BitPaint</div>
            <div class="nav-buttons">
                <button id="nav-hall-btn" class="icon-btn"><i class="fas fa-trophy" style="color: gold;"></i> Зал Славы</button>
                <button id="nav-draw-btn" class="neon-btn"><i class="fas fa-plus"></i> Рисовать</button>
            </div>
            <div class="user-profile-mini" id="nav-profile-btn">
                <img id="nav-user-avatar" src="" alt="avatar">
                <span id="user-name-display">User</span>
            </div>
        </header>
        <main class="feed-container" id="feed-container"></main>
    </div>

    <!-- Экран рисования (Канвас) -->
    <div id="draw-screen" class="screen hidden">
        <div class="toolbar glow-panel">
            <button class="tool-btn active" data-tool="pencil" title="Карандаш"><i class="fas fa-pencil-alt"></i></button>
            <button class="tool-btn" data-tool="line" title="Линия"><i class="fas fa-slash"></i></button>
            <button class="tool-btn" data-tool="rect" title="Прямоугольник"><i class="far fa-square"></i></button>
            <button class="tool-btn" data-tool="circle" title="Круг"><i class="far fa-circle"></i></button>
            <button class="tool-btn" data-tool="eraser" title="Ластик"><i class="fas fa-eraser"></i></button>
            <button class="tool-btn" data-tool="picker" title="Пипетка"><i class="fas fa-eye-dropper"></i></button>
            <button class="tool-btn" data-tool="fill" title="Заливка"><i class="fas fa-fill-drip"></i></button>
            
            <div class="separator"></div>
            
            <input type="color" id="color-picker" value="#8a2be2">
            <input type="range" id="line-width" min="1" max="50" value="5">
            
            <div class="separator"></div>

            <label class="checkbox-label"><input type="checkbox" id="neon-mode"> Неон</label>
            <label class="checkbox-label"><input type="checkbox" id="fill-shapes"> Заливка фигур</label>
            <select id="texture-select">
                <option value="none">Без текстуры</option>
                <option value="bricks">Кирпичи</option>
                <option value="wood">Дерево</option>
            </select>

            <div class="separator"></div>

            <button id="undo-btn" class="icon-btn" title="Шаг назад (Ctrl+Z)"><i class="fas fa-undo"></i></button>
            <button id="save-draw-btn" class="neon-btn"><i class="fas fa-save"></i> Сохранить</button>
            <button id="close-draw-btn" class="icon-btn danger"><i class="fas fa-times"></i></button>
        </div>
        <div class="canvas-container">
            <!-- Обертка для правильного масштабирования на мобилках -->
            <div class="canvas-wrapper">
                <canvas id="paint-canvas" width="800" height="600"></canvas>
                <!-- Маска для рисования круглой аватарки -->
                <div id="avatar-mask" class="hidden"></div>
            </div>
        </div>
    </div>

    <!-- Экран Зала Славы -->
    <div id="hall-screen" class="screen hidden">
        <header class="top-nav glow-panel">
            <h2><i class="fas fa-trophy" style="color: gold;"></i> Зал Славы (Топ-10)</h2>
            <button id="back-from-hall-btn" class="neon-btn">Назад</button>
        </header>
        <div class="hall-container" id="hall-container"></div>
    </div>

    <!-- Экран Профиля -->
    <div id="profile-screen" class="screen hidden">
        <header class="top-nav glow-panel">
            <h2><i class="fas fa-user"></i> Мой Профиль</h2>
            <button id="back-from-profile-btn" class="neon-btn">Назад</button>
        </header>
        <div class="profile-stats glow-panel">
            <img id="profile-big-avatar" src="" alt="avatar" class="big-avatar">
            <h3 id="profile-name">Name</h3>
            <p>Собрано лайков: <span id="profile-likes-count">0</span></p>
            <button id="change-avatar-btn" class="neon-btn" style="margin-top:10px;"><i class="fas fa-paint-brush"></i> Нарисовать аватарку</button>
        </div>
        <div class="feed-container" id="profile-feed-container"></div>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
