<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitPaint - Neon Cyberpunk Art</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="auth-card glow-panel">
            <h1 class="neon-text">BitPaint</h1>
            <p>Войдите в кибер-пространство</p>
            <input type="text" id="auth-nickname" placeholder="Твой никнейм..." maxlength="20">
            <button id="auth-btn" class="btn-primary">Войти <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>

    <header id="app-header" class="hidden">
        <div class="logo neon-text">BitPaint</div>
        <nav class="nav-links">
            <button class="nav-btn" data-target="main-screen"><i class="fa-solid fa-house"></i> Лента</button>
            <button class="nav-btn" data-target="draw-screen"><i class="fa-solid fa-palette"></i> Рисовать</button>
            <button class="nav-btn" data-target="hall-screen"><i class="fa-solid fa-trophy"></i> Зал Славы</button>
        </nav>
        <div class="user-profile-mini" id="nav-profile-btn" onclick="viewProfile(currentUser)">
            <img src="" id="header-avatar" alt="Avatar">
            <span id="header-nickname">User</span>
        </div>
    </header>

    <div id="main-screen" class="screen hidden with-header">
        <div class="container">
            <div id="feed-container" class="grid-container"></div>
        </div>
    </div>

    <div id="draw-screen" class="screen hidden with-header">
        <div class="container draw-container">
            <div class="toolbar glow-panel">
                <button id="undo-btn" class="btn-secondary" title="Шаг назад"><i class="fa-solid fa-rotate-left"></i></button>
                <input type="color" id="color-picker" value="#b967ff">
                <input type="range" id="brush-size" min="1" max="50" value="5">
                
                <label class="neon-checkbox">
                    <input type="checkbox" id="neon-toggle"> Неон
                </label>

                <select id="shape-fill" title="Стиль фигур">
                    <option value="none">Контур</option>
                    <option value="solid">Заливка цветом</option>
                    <option value="wood">Текстура: Дерево</option>
                    <option value="brick">Текстура: Кирпич</option>
                </select>

                <button class="tool-btn active" data-tool="pencil" title="Карандаш"><i class="fa-solid fa-pencil"></i></button>
                <button class="tool-btn" data-tool="bucket" title="Умная заливка"><i class="fa-solid fa-fill-drip"></i></button>
                <button class="tool-btn" data-tool="line" title="Линия"><i class="fa-solid fa-minus"></i></button>
                <button class="tool-btn" data-tool="rect" title="Прямоугольник"><i class="fa-regular fa-square"></i></button>
                <button class="tool-btn" data-tool="circle" title="Круг"><i class="fa-regular fa-circle"></i></button>
                <button class="tool-btn" data-tool="eraser" title="Ластик"><i class="fa-solid fa-eraser"></i></button>
                <button class="tool-btn" data-tool="picker" title="Пипетка"><i class="fa-solid fa-eye-dropper"></i></button>
                <button id="clear-canvas" class="btn-danger" title="Очистить всё"><i class="fa-solid fa-trash"></i></button>
            </div>
            <div class="canvas-wrapper">
                <canvas id="paint-canvas" width="1280" height="720"></canvas>
            </div>
            <div class="publish-panel">
                <input type="text" id="art-title" placeholder="Название шедевра...">
                <button id="publish-btn" class="btn-primary">Опубликовать <i class="fa-solid fa-cloud-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <div id="hall-screen" class="screen hidden with-header">
        <div class="container">
            <h2 class="neon-text text-center"><i class="fa-solid fa-crown"></i> Зал Славы</h2>
            <div id="hall-container" class="list-container"></div>
        </div>
    </div>

    <div id="profile-screen" class="screen hidden with-header">
        <div class="container">
            <div class="profile-header glow-panel">
                <div class="avatar-wrapper">
                    <img src="" id="profile-avatar" alt="Avatar">
                    <button id="change-avatar-btn" class="edit-avatar-btn"><i class="fa-solid fa-camera"></i></button>
                </div>
                <div class="profile-info">
                    <h2 id="profile-nickname" class="neon-text">Nickname</h2>
                    <p><i class="fa-solid fa-heart"></i> Всего лайков: <span id="profile-likes">0</span></p>
                </div>
            </div>
            <h3 class="neon-text" id="profile-gallery-title">Работы</h3>
            <div id="profile-gallery" class="grid-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
