<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BitPaint - Рисуй и Делись</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <!-- Экран входа -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <h1>Добро пожаловать в BitPaint</h1>
            <p>Войдите, чтобы творить и делиться</p>
            <input type="text" id="nickname-input" placeholder="Введите ваш ник">
            <button id="login-button">Войти</button>
            <p id="nickname-error" class="error-message"></p>
        </div>
    </div>

    <!-- Главный экран (Галерея) -->
    <div id="main-screen" class="screen">
        <header>
            <div class="logo">BitPaint</div>
            <div class="user-info">
                <button id="leaderboard-button" class="header-btn" title="Зал славы"><i class="fas fa-trophy"></i> Топ</button>
                <span id="current-user-nickname" class="clickable-nick current-user-nick" title="Мой профиль"></span>
                <button id="draw-button"><i class="fas fa-pencil-alt"></i> Рисовать</button>
            </div>
        </header>
        <main id="gallery-container" class="gallery-grid"></main>
    </div>

    <!-- ЭКРАН ПРОФИЛЯ -->
    <div id="profile-screen" class="screen">
        <header class="top-bar">
            <button class="icon-button back-to-main"><i class="fas fa-arrow-left"></i> В ленту</button>
        </header>
        <div class="profile-header-card">
            <div class="profile-avatar-container"><img id="profile-avatar-img" src="" alt="Аватар"></div>
            <div class="profile-info">
                <h2 id="profile-nickname">@Nick</h2>
                <div class="profile-stats">
                    <p><i class="fas fa-heart"></i> Лайков: <span id="profile-total-likes">0</span></p>
                    <p><i class="fas fa-image"></i> Рисунков: <span id="profile-total-drawings">0</span></p>
                </div>
            </div>
            <button id="edit-avatar-button"><i class="fas fa-user-edit"></i> Изменить аватар</button>
        </div>
        <h3 class="section-title">Галерея пользователя</h3>
        <main id="profile-gallery-container" class="gallery-grid"></main>
    </div>

    <!-- ЭКРАН ЗАЛА СЛАВЫ -->
    <div id="leaderboard-screen" class="screen">
        <header class="top-bar">
            <button class="icon-button back-to-main"><i class="fas fa-arrow-left"></i> Назад</button>
        </header>
        <h2 class="section-title" style="text-align: center; color: var(--accent-neon); font-size: 32px; border-bottom: none;"><i class="fas fa-crown" style="color: gold;"></i> Зал Славы (Топ-10)</h2>
        <div class="leaderboard-container">
            <ul id="leaderboard-list"></ul>
        </div>
    </div>

    <!-- Экран рисования (Редактор) -->
    <div id="editor-screen" class="screen">
        <div class="editor-container">
            <div class="toolbar">
                <div class="tool-group">
                    <button class="tool-btn" id="undo-button" title="Отменить (Ctrl+Z)"><i class="fas fa-undo"></i></button>
                </div>
                
                <div class="tool-group brush-modes">
                    <button class="mode-btn active" id="mode-normal">Обычная</button>
                    <button class="mode-btn" id="mode-neon">Неон ✨</button>
                </div>

                <div class="tool-group">
                    <button class="tool-btn active" data-tool="pencil" title="Карандаш"><i class="fas fa-pencil-alt"></i></button>
                    <button class="tool-btn" data-tool="eraser" title="Ластик"><i class="fas fa-eraser"></i></button>
                    <!-- Изменили заливку: теперь это инструмент, а не мгновенное действие -->
                    <button class="tool-btn" data-tool="fill" title="Заливка (Ведро)"><i class="fas fa-fill-drip"></i></button>
                    <button class="tool-btn" data-tool="line" title="Линия"><i class="fas fa-slash"></i></button>
                    <button class="tool-btn" data-tool="rect" title="Прямоугольник"><i class="far fa-square"></i></button>
                    <button class="tool-btn" data-tool="circle" title="Круг"><i class="far fa-circle"></i></button>
                </div>
                <div class="tool-group">
                    <label for="color-picker" class="color-label" title="Выбор цвета">
                        <i class="fas fa-palette"></i>
                        <input type="color" id="color-picker" value="#8a2be2">
                    </label>
                </div>
                <div class="tool-group">
                     <label for="line-width" class="width-label" title="Толщина"><i class="fas fa-arrows-alt-h"></i></label>
                    <input type="range" id="line-width" min="1" max="50" value="5">
                </div>
                <div class="tool-group right-align">
                     <button id="publish-button"><i class="fas fa-upload"></i> Сохранить</button>
                     <button id="back-to-gallery-button"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <canvas id="paint-canvas"></canvas>
        </div>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
